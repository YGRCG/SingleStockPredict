lgbm:
  objective:         "binary"
  metric:            "auc"
  n_estimators:      500
  learning_rate:     0.01
  max_depth:         6
  num_leaves:        31
  min_child_samples: 20
  subsample:         0.8
  colsample_bytree:  0.8
  reg_alpha:         0.1
  reg_lambda:        0.1
  early_stopping_rounds: 100
  verbose:           -1
  random_state:      42

xgb:
  objective:       "binary:logistic"
  eval_metric:     "auc"
  n_estimators:    500
  learning_rate:   0.05
  max_depth:       6
  subsample:       0.8
  colsample_bytree: 0.8
  reg_alpha:       0.1
  reg_lambda:      0.1
  early_stopping_rounds: 50
  verbosity:       0
  random_state:    42

lstm:
  seq_len:      30       # 输入序列长度
  hidden_size:  64
  num_layers:   2
  dropout:      0.2
  learning_rate: 0.001
  epochs:       100
  batch_size:   64
  patience:     10       # early stopping
